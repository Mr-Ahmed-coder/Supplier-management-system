<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoice Details</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="wrapper">
    <!-- Sidebar -->
    <div id="sidebar-wrapper"></div>

    <!-- Page Content -->
    <div id="page-content-wrapper">
      <nav class="top-navbar d-flex align-items-center justify-content-between shadow-sm">
        <div class="d-flex align-items-center">
          <i class="bi bi-list fs-3" id="menu-toggle"></i>
          <h4 class="ms-3 m-0 page-title">Invoice Editor</h4>
        </div>
        <div class="user-info">
          <span class="user-role-badge" id="userRoleBadge">User</span>
          <span class="fw-semibold text-secondary" id="userNameLabel">Loading...</span>
          <button class="btn btn-outline-danger btn-sm ms-3" id="logoutBtn"><i class="bi bi-box-arrow-right"></i>
            Logout</button>
        </div>
      </nav>

      <div class="container-fluid py-4 px-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
          <div>
            <h3 class="fw-bold mb-1" id="pageHeaderTitle"> Tumi cosmetics </h3>
            <p class="text-muted mb-0">Ensure billing accuracy</p>
          </div>
          <a href="invoice.html" class="btn btn-secondary">
            <i class="bi bi-arrow-left me-1"></i> Back to Invoices
          </a>
        </div>

        <div class="row justify-content-center">
          <div class="col-lg-11">
            
            <!-- Financial Summary Cards -->
            <div class="row g-3 mb-4">
              <div class="col-md-4">
                <div class="card bg-white border shadow-sm h-100 p-3 rounded-3">
                  <span class="text-dark fw-bold mb-2 d-block">Grand Total (UGX)</span>
                  <div class="d-flex align-items-center mt-1">
                    <span class="fs-4 fw-bold text-primary me-2">UGX</span>
                    <input type="text" class="form-control-plaintext fw-bold text-primary p-0 m-0 pointer-events-none" id="invoiceAmount" readonly value="0" data-raw-total="0" style="font-size: 1.5rem;">
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="card bg-light border-primary border-opacity-25 shadow-sm h-100 p-3 rounded-3">
                  <label for="amountPaid" class="text-dark fw-bold mb-2 d-block">Amount Paid</label>
                  <div class="input-group mt-1 shadow-sm">
                    <span class="input-group-text bg-white text-secondary fw-bold border-end-0">UGX</span>
                    <input type="number" class="form-control fw-bold text-dark border-start-0" id="amountPaid" min="0" placeholder="Enter amount paid" style="font-size: 1.25rem;">
                  </div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="card bg-white border shadow-sm h-100 p-3 rounded-3">
                  <span class="text-dark fw-bold mb-2 d-block">Remaining Balance</span>
                  <div class="d-flex align-items-center mt-1">
                    <span id="invoiceBalanceLabel" class="fs-4 fw-bold text-danger me-2">UGX</span>
                    <input type="text" class="form-control-plaintext fw-bold text-danger p-0 m-0 pointer-events-none" id="invoiceBalance" readonly value="0" style="font-size: 1.5rem;">
                  </div>
                </div>
              </div>
            </div>

            <!-- Items Cart Section -->
            <h5 class="fw-bold text-dark mb-3 mt-5">Invoice Items</h5>
            <div class="card shadow-sm border-0 mb-4 p-4 rounded-3">
              <div class="row g-3 align-items-end mb-4">
                <div class="col-md-5">
                  <label class="form-label fw-semibold text-secondary small">Select Cosmetic Item</label>
                  <select class="form-select" id="itemProduct">
                    <option value="">-- Choose Product --</option>
                  </select>
                </div>
                <div class="col-md-2">
                  <label class="form-label fw-semibold text-secondary small">Price</label>
                  <input type="number" class="form-control bg-light" id="itemPrice" readonly placeholder="0">
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-semibold text-secondary small">Quantity</label>
                  <input type="number" class="form-control" id="itemQuantity" min="1" placeholder="Qty">
                </div>
                <div class="col-md-2">
                  <button class="btn btn-outline-primary w-100 fw-semibold" id="addToCartBtn"><i class="bi bi-cart-plus me-1"></i> Add</button>
                </div>
              </div>

              <div class="table-responsive border rounded-3 bg-white">
                <table class="table table-hover align-middle mb-0">
                  <thead class="bg-light text-secondary text-uppercase small" style="font-size: 0.8rem; border-bottom: 2px solid #e2e8f0;">
                    <tr>
                      <th class="py-3 px-3">Item Description</th>
                      <th class="py-3">Unit Price</th>
                      <th class="py-3">Qty</th>
                      <th class="py-3">Subtotal</th>
                      <th class="text-center py-3">Action</th>
                    </tr>
                  </thead>
                  <tbody id="cartTableBody">
                    <tr><td colspan="5" class="text-center text-muted py-4">No items added yet.</td></tr>
                  </tbody>
                </table>
              </div>
            </div>

            <!-- Invoice Information Section -->
            <h5 class="fw-bold text-dark mb-3 mt-5">Invoice Information</h5>
            <div class="card shadow-sm border-0 mb-5 p-4 rounded-3">
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label text-secondary small fw-semibold">Customer Name</label>
                  <input type="text" class="form-control bg-light border-0" id="customerName" required maxlength="100" placeholder="Search customer or add fresh..." list="customerListOptions" autocomplete="off">
                  <datalist id="customerListOptions"></datalist>
                </div>
                <div class="col-md-6">
                  <label class="form-label text-secondary small fw-semibold">Phone Number (Optional)</label>
                  <input type="tel" class="form-control bg-light border-0" id="customerPhone" placeholder="e.g. +256 700 000000">
                </div>
                <div class="col-md-6">
                  <label class="form-label text-secondary small fw-semibold">Customer Location (Optional)</label>
                  <input type="text" class="form-control bg-light border-0" id="customerLocation" placeholder="e.g. Kampala, Uganda">
                </div>
                <div class="col-md-6">
                  <label class="form-label text-secondary small fw-semibold">Date Issued</label>
                  <input type="date" class="form-control bg-light border-0" id="invoiceDate" required>
                </div>
                <div class="col-md-6">
                  <label class="form-label text-secondary small fw-semibold">Expected Payment Date (Optional)</label>
                  <input type="date" class="form-control bg-light border-0" id="invoiceDueDate">
                </div>
              </div>
            </div>

            <!-- Bottom Actions -->
            <div class="d-flex justify-content-end align-items-center py-3 border-top mb-5">
              <a href="#" class="btn btn-secondary px-4 me-2" id="printInvoiceBtn" style="display:none;"><i class="bi bi-printer me-1"></i>Download PDF</a>
              <button class="btn btn-danger px-4 me-2 admin-only" id="deleteInvoiceBtn" style="display:none;"><i class="bi bi-trash me-1"></i>Delete</button>
              <button class="btn btn-primary px-5 shadow fw-semibold" id="saveInvoice">Save Invoice</button>
            </div>

          </div>
        </div>
      </div>
    </div>

    <script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script src="auth.js"></script>
    <script src="layout.js"></script>
    <script src="script.js"></script>

    <script>
      let customers = [];
      let editId = null;

      const params = new URLSearchParams(window.location.search);
      const queryId = params.get('id');

      const userStr = localStorage.getItem('user');
      const currentUser = userStr ? JSON.parse(userStr) : null;
      const isAdmin = currentUser && currentUser.role === 'Admin';

      let products = [];
      let cartItems = [];

      async function fetchInitialData() {
        try {
          const custRes = await fetch(`${API_URL}/customers?_t=${Date.now()}`, { headers: getAuthHeaders(), cache: "no-store" });
          customers = await custRes.json();
          
          const customerList = document.getElementById("customerListOptions");
          if (customerList && customers) {
             customers.forEach(c => {
                if (c.name) {
                   const opt = document.createElement("option");
                   opt.value = c.name;
                   customerList.appendChild(opt);
                }
             });
          }

          const prodRes = await fetch(`${API_URL}/products?_t=${Date.now()}`, { headers: getAuthHeaders(), cache: "no-store" });
          products = await prodRes.json();
          
          const productSelect = document.getElementById("itemProduct");
          products.forEach(p => {
            if (p.stock > 0) {
              const opt = document.createElement("option");
              opt.value = p._id;
              opt.textContent = `${p.name} (Stock: ${p.stock})`;
              opt.dataset.price = p.price;
              opt.dataset.name = p.name;
              opt.dataset.maxStock = p.stock;
              productSelect.appendChild(opt);
            }
          });

          if (queryId) {
            editId = queryId;
            document.getElementById('pageHeaderTitle').innerText = 'Edit Invoice';
            const printBtn = document.getElementById('printInvoiceBtn');
            printBtn.style.display = 'inline-block';
            printBtn.href = `printinvoice.html?id=${editId}`;
            if (isAdmin) {
              document.getElementById('deleteInvoiceBtn').style.display = 'inline-block';
            }

            const invRes = await fetch(`${API_URL}/invoices`, { headers: getAuthHeaders() });
            const invoices = await invRes.json();
            const inv = invoices.find(x => x._id === editId);

            if (inv) {
              let dateVal = "";
              if (inv.date) {
                const d = new Date(inv.date);
                if (!isNaN(d)) dateVal = d.toISOString().split('T')[0];
              }
              document.getElementById("customerName").value = inv.customerName || (inv.customer ? inv.customer.name : '');
              document.getElementById("customerPhone").value = inv.customerPhone || (inv.customer ? inv.customer.phone : '');
              document.getElementById("customerLocation").value = inv.location || '';
              document.getElementById("invoiceDate").value = dateVal;
              
              if (inv.dueDate) {
                const dd = new Date(inv.dueDate);
                if (!isNaN(dd)) document.getElementById("invoiceDueDate").value = dd.toISOString().split('T')[0];
              }
              
              if (inv.amountPaid !== undefined) {
                  document.getElementById("amountPaid").value = inv.amountPaid || "";
              } else {
                  // Legacy Fallback mapping
                  document.getElementById("amountPaid").value = inv.status === 'Paid' ? (inv.totalAmount || inv.amount) : "";
              }
              
              if (inv.items && Array.isArray(inv.items)) {
                  cartItems = inv.items.map(item => ({
                      productId: item.product._id || item.product,
                      productName: item.productName || (item.product.name ? item.product.name : "Unknown"),
                      price: item.price,
                      quantity: item.quantity,
                      subtotal: item.subtotal
                  }));
              }
              renderCart();
            }
          } else {
            document.getElementById("invoiceDate").value = new Date().toISOString().split('T')[0];
          }
        } catch (err) { console.error(err); }
      }

      document.getElementById("itemProduct").addEventListener("change", function() {
        const selected = this.options[this.selectedIndex];
        if (selected.value) {
            document.getElementById("itemPrice").value = selected.dataset.price;
            document.getElementById("itemQuantity").value = 1;
            document.getElementById("itemQuantity").max = selected.dataset.maxStock;
        } else {
            document.getElementById("itemPrice").value = "";
            document.getElementById("itemQuantity").value = "";
        }
      });

      document.getElementById("addToCartBtn").addEventListener("click", function(e) {
          e.preventDefault();
          const select = document.getElementById("itemProduct");
          const selected = select.options[select.selectedIndex];
          if (!selected.value) return alert("Please select a product.");

          const qtyStr = document.getElementById("itemQuantity").value;
          const qty = parseInt(qtyStr);
          const maxStock = parseInt(selected.dataset.maxStock);

          if (isNaN(qty) || qty <= 0) return alert("Please enter a valid quantity.");
          if (!editId && qty > maxStock) return alert(`Not enough stock. Only ${maxStock} available.`);

          const price = parseFloat(selected.dataset.price);
          const existingItemIndex = cartItems.findIndex(item => item.productId === selected.value);

          if (existingItemIndex > -1) {
              const newQty = cartItems[existingItemIndex].quantity + qty;
              if (!editId && newQty > maxStock) return alert(`Not enough stock. Only ${maxStock} available in total.`);
              cartItems[existingItemIndex].quantity = newQty;
              cartItems[existingItemIndex].subtotal = newQty * price;
          } else {
              cartItems.push({
                  productId: selected.value,
                  productName: selected.dataset.name,
                  price: price,
                  quantity: qty,
                  subtotal: qty * price
              });
          }

          select.value = "";
          document.getElementById("itemPrice").value = "";
          document.getElementById("itemQuantity").value = "";
          renderCart();
      });

      window.removeFromCart = function(index) {
          cartItems.splice(index, 1);
          renderCart();
      };

      document.getElementById("amountPaid").addEventListener("input", calculateBalance);

      function calculateBalance() {
          const totalRaw = parseFloat(document.getElementById("invoiceAmount").dataset.rawTotal || 0);
          const paidRaw = parseFloat(document.getElementById("amountPaid").value || 0);
          const balance = Math.max(0, totalRaw - paidRaw);
          
          const balInput = document.getElementById("invoiceBalance");
          const balLabel = document.getElementById("invoiceBalanceLabel");
          
          balInput.value = balance.toLocaleString('en-US');
          
          if (balance === 0 && totalRaw > 0) {
              balInput.className = "form-control-plaintext fw-bold text-success p-0 m-0 pointer-events-none";
              if (balLabel) balLabel.className = "fs-4 fw-bold text-success me-2";
          } else {
              balInput.className = "form-control-plaintext fw-bold text-danger p-0 m-0 pointer-events-none";
              if (balLabel) balLabel.className = "fs-4 fw-bold text-danger me-2";
          }
      }

      function renderCart() {
          const tbody = document.getElementById("cartTableBody");
          tbody.innerHTML = "";
          let grandTotal = 0;

          if (cartItems.length === 0) {
              tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No items added yet.</td></tr>';
              document.getElementById("invoiceAmount").value = "0";
              return;
          }

          cartItems.forEach((item, index) => {
              grandTotal += item.subtotal;
              tbody.innerHTML += `
                  <tr>
                      <td class="fw-semibold">${item.productName}</td>
                      <td>UGX ${item.price.toLocaleString('en-US')}</td>
                      <td>${item.quantity}</td>
                      <td class="fw-bold text-primary">UGX ${item.subtotal.toLocaleString('en-US')}</td>
                      <td class="text-center">
                          <button class="btn btn-sm btn-outline-danger" onclick="removeFromCart(${index})"><i class="bi bi-x"></i></button>
                      </td>
                  </tr>
              `;
          });
          document.getElementById("invoiceAmount").value = grandTotal.toLocaleString('en-US');
          document.getElementById("invoiceAmount").dataset.rawTotal = grandTotal;
          calculateBalance();
      }

      document.getElementById("saveInvoice").addEventListener("click", async function () {
        const name = document.getElementById("customerName").value.trim();
        const phone = document.getElementById("customerPhone").value.trim();
        const location = document.getElementById("customerLocation").value.trim();
        const date = document.getElementById("invoiceDate").value;
        const dueDate = document.getElementById("invoiceDueDate").value;
        const amountPaid = document.getElementById("amountPaid").value;

        if (!name || !date) return alert("Please fill all required invoice details.");
        if (cartItems.length === 0) return alert("Please add at least one item to the cart before saving.");

        const formattedItems = cartItems.map(item => ({
            product: item.productId,
            productName: item.productName,
            quantity: item.quantity,
            price: item.price,
            subtotal: item.subtotal
        }));

        const matchingCust = Array.isArray(customers) ? customers.find(c => c.name && c.name.toLowerCase() === name.toLowerCase()) : null;
        const customerId = matchingCust ? matchingCust._id : null;

        let invoiceNumber = '';
        if (editId) {
          const existingInv = await fetch(`${API_URL}/invoices?_t=${Date.now()}`, { headers: getAuthHeaders(), cache: "no-store" }).then(r => r.json());
          const found = existingInv.find(x => x._id === editId);
          invoiceNumber = found ? found.number : `INV-${Date.now()}`;
        } else {
          const now = new Date();
          const dateStr = now.getFullYear().toString() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
          const rand = String(Math.floor(Math.random() * 100000)).padStart(5, '0');
          invoiceNumber = `INV-${dateStr}-${rand}`;
        }

        const payload = {
          number: invoiceNumber,
          customer: customerId,
          customerName: name,
          customerPhone: phone,
          location,
          date, 
          dueDate: dueDate ? dueDate : undefined,
          totalAmount: parseFloat(document.getElementById("invoiceAmount").dataset.rawTotal || 0),
          amountPaid,
          items: formattedItems
        };

        try {
          let res;
          if (editId) {
            res = await fetch(`${API_URL}/invoices/${editId}`, {
              method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify(payload)
            });
          } else {
            res = await fetch(`${API_URL}/invoices`, {
              method: 'POST', headers: getAuthHeaders(), body: JSON.stringify(payload)
            });
          }

          if (res.ok) {
            window.location.href = "invoice.html";
          } else {
            const errData = await res.json().catch(() => ({}));
            alert(errData.message || "Error saving invoice. Ensure enough stock is available.");
          }
        } catch (err) { 
            alert("System Error: " + err.message);
            console.error(err); 
        }
      });

      document.getElementById("customerName").addEventListener("input", function() {
          const val = this.value.trim().toLowerCase();
          if (!val) return;
          const match = customers.find(c => c.name && c.name.toLowerCase() === val);
          if (match) {
              if (match.phone) document.getElementById("customerPhone").value = match.phone;
              const place = match.location || match.company || "";
              if (place) document.getElementById("customerLocation").value = place;
          }
      });

      document.getElementById("deleteInvoiceBtn").addEventListener("click", async function () {
        if (!editId) return;
        if (confirm("Are you sure you want to delete this invoice?")) {
          try {
            const res = await fetch(`${API_URL}/invoices/${editId}`, { method: 'DELETE', headers: getAuthHeaders() });
            if (res.ok) {
              window.location.href = "invoice.html";
            } else {
              alert("Restricted: Admins only.");
            }
          } catch (err) { console.error(err); }
        }
      });

      fetchInitialData();
    </script>
</body>

</html>
