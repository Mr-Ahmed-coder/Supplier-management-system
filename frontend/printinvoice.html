<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Print</title>
  <link rel="stylesheet" href="style.css">

  <style>
    *
    /* { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
  }

  /* Top action bar — hidden when printing */
    */
  </style>
</head>

<body>

  <!-- Action buttons — hidden during print -->
  <div class="action-bar">
    <button class="btn-back" onclick="window.history.back()">&#8592; Back</button>
    <button class="btn-print" onclick="window.print()">&#128438; Print / Download PDF</button>
  </div>

  <div class="invoice">

    <div class="header">
      <h1 style="margin-bottom: 5px;">Tumi Cosmetics</h1>
      <h3 id="invoiceNumber" style="margin-bottom: 6px; color: white;">INVOICE #</h3>
      <p id="invoiceDates">Date: --- | Expected Payment: ---</p>
    </div>

    <div class="customer-info">
      <h3>Customer:</h3>
      <p id="customerName">Loading...</p>
    </div>

    <table class="invoice-table">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="itemsBody">
        <tr>
          <td colspan="4" style="text-align:center;color:#aaa;">Loading...</td>
        </tr>
      </tbody>
    </table>

    <div class="summary" id="summarySection">
      <!-- Filled by JS -->
    </div>

    <div class="invoice-footer">
      Tumi cosmetics &mdash; Thank you for your business!
    </div>

  </div>

  <script>
    let API_URL = '/api';
    if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' || window.location.protocol === 'file:') {
        if (window.location.port !== '5000') {
            API_URL = 'http://localhost:5000/api';
        }
    }

    function getAuthHeaders() {
      const token = localStorage.getItem('token');
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (token || '')
      };
    }

    function formatDate(dateStr) {
      if (!dateStr) return '---';
      const d = new Date(dateStr);
      if (isNaN(d)) return '---';
      return d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function getExpectedPaymentDate(inv) {
      if (inv.dueDate) {
        const d = new Date(inv.dueDate);
        if (!isNaN(d)) return d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
      }
      if (!inv.date && !inv.createdAt) return '---';
      const d = new Date(inv.date || inv.createdAt);
      if (isNaN(d)) return '---';
      d.setDate(d.getDate() + 30); // Fallback: 30 days after issue
      return d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatCurrency(num) {
      return Number(num).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    async function loadInvoice() {
      const params = new URLSearchParams(window.location.search);
      const invoiceId = params.get('id');

      if (!invoiceId) {
        document.getElementById('customerName').textContent = 'No invoice ID provided';
        return;
      }

      try {
        // Fetch invoice
        const invRes = await fetch(`${API_URL}/invoices`, { headers: getAuthHeaders() });
        const invoices = await invRes.json();
        const inv = invoices.find(x => x._id === invoiceId);

        if (!inv) {
          document.getElementById('customerName').textContent = 'Invoice not found';
          return;
        }

        // Header
        document.getElementById('invoiceNumber').textContent = `INVOICE #${inv.number}`;
        document.getElementById('invoiceDates').textContent =
          `Date: ${formatDate(inv.date || inv.createdAt)} | Expected Payment: ${getExpectedPaymentDate(inv)}`;
        document.title = `Invoice ${inv.number}`;

        // Customer
        const custName = inv.customerName || (inv.customer ? inv.customer.name : 'Unknown');
        const custLocation = inv.location ? `<br><small style="font-weight:normal; font-size:0.9em; color:#555;">Location: ${inv.location}</small>` : '';
        document.getElementById('customerName').innerHTML = `${custName}${custLocation}`;

        // Items table — loop through cart items
        const tbody = document.getElementById('itemsBody');
        if (inv.items && inv.items.length > 0) {
            tbody.innerHTML = inv.items.map(item => `
              <tr>
                <td>${item.productName || (item.product && item.product.name ? item.product.name : 'Cosmetic Item')}</td>
                <td>${item.quantity}</td>
                <td>${formatCurrency(item.price)}</td>
                <td>${formatCurrency(item.subtotal)}</td>
              </tr>
            `).join('');
        } else {
            // Backward compatibility for old invoices
            tbody.innerHTML = `
            <tr>
              <td>Legacy Invoice Charge</td>
              <td>1</td>
              <td>${formatCurrency(inv.amount)}</td>
              <td>${formatCurrency(inv.amount)}</td>
            </tr>
          `;
        }

        // Fetch receipts (payments) linked to this invoice
        let totalPaid = 0;
        try {
          const rcptRes = await fetch(`${API_URL}/receipts`, { headers: getAuthHeaders() });
          const receipts = await rcptRes.json();
          const linkedReceipts = receipts.filter(r =>
            (r.invoice && (r.invoice === invoiceId || r.invoice._id === invoiceId))
          );

          // Add paid receipt rows to the items table if any
          if (linkedReceipts.length > 0) {
            linkedReceipts.forEach(r => {
              totalPaid += Number(r.amount);
            });
          }
        } catch (e) {
          console.log('Could not fetch receipts:', e);
        }

        // Summary
        const totalAmount = inv.totalAmount !== undefined ? inv.totalAmount : (inv.amount || 0);
        let amountPaid = inv.amountPaid !== undefined ? inv.amountPaid : (inv.status === 'Paid' ? totalAmount : 0);
        let balance = inv.balance !== undefined ? inv.balance : Math.max(0, totalAmount - amountPaid);

        // Fallback calculation for ancient receipts
        if (inv.amountPaid === undefined && totalPaid > amountPaid) {
            amountPaid = totalPaid;
            balance = Math.max(0, totalAmount - amountPaid);
        }

        const summary = document.getElementById('summarySection');

        let statusClass = 'pending';
        if (inv.status === 'Paid') statusClass = 'paid';
        else if (inv.status === 'Overdue' || inv.status === 'Unpaid') statusClass = 'overdue';
        else if (inv.status === 'Partial') statusClass = 'pending'; // CSS reuse for yellow/orange

        summary.innerHTML = `
        <p><strong>Grand Total:</strong> UGX ${formatCurrency(totalAmount)}</p>
        ${amountPaid > 0 ? `<p class="paid"><strong>Amount Paid:</strong> UGX ${formatCurrency(amountPaid)}</p>` : ''}
        <p class="amount-highlight ${statusClass}">
          <strong>${inv.status === 'Paid' ? 'Fully Paid' : 'Remaining Balance'}:</strong>
          UGX ${formatCurrency(balance)}
        </p>
        <p style="margin-top:8px;font-size:13px;color:#000;font-weight:bold;">Status: <span class="${statusClass}" style="text-transform:uppercase;">${inv.status}</span></p>
      `;

      } catch (err) {
        console.error('Error loading invoice:', err);
        document.getElementById('customerName').textContent = 'Error loading invoice data';
      }
    }

    loadInvoice();
  </script>

</body>

</html>
