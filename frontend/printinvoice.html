<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receipt Print</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', Courier, monospace;
      background: #f4f4f4;
      color: #000;
      font-size: 13px;
    }
    
    .action-bar {
      text-align: center;
      padding: 15px;
      background: #fff;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    .btn-back, .btn-print {
      padding: 10px 20px;
      font-size: 14px;
      margin: 0 10px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #eee;
      border-radius: 4px;
      font-family: Arial, sans-serif;
    }
    
    .btn-print {
      background: #0d6efd;
      color: white;
      border: none;
      font-weight: bold;
    }

    /* Thermal Receipt Container - ~300px width */
    .receipt {
      width: 300px;
      max-width: 100%;
      margin: 0 auto;
      background: #fff;
      padding: 15px 10px;
      box-shadow: 0 0 5px rgba(0,0,0,0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }
    
    .header h1 {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    
    .header p {
      font-size: 12px;
      margin: 2px 0;
    }

    .separator {
      border-top: 1px dashed #000;
      margin: 10px 0;
    }

    .info-section {
      margin-bottom: 10px;
      font-size: 12px;
    }
    
    .info-section p {
      margin: 3px 0;
    }

    /* Items Table */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
      font-size: 12px;
    }
    
    th, td {
      padding: 4px 2px;
      vertical-align: top;
    }
    
    th {
      border-bottom: 1px dashed #000;
      text-align: left;
      font-weight: bold;
    }
    
    .text-right { text-align: right; }
    .text-center { text-align: center; }

    /* Summary */
    .summary {
      margin-top: 10px;
      padding-top: 5px;
      font-size: 12px;
    }
    
    .summary-line {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }
    
    .summary-line.bold {
      font-weight: bold;
      font-size: 13px;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 11px;
    }

    /* Print Optimization - Hide UI, kill margins */
    @media print {
      body {
        background: transparent;
        padding: 0;
        margin: 0;
      }
      .action-bar {
        display: none !important;
      }
      .receipt {
        width: auto;
        max-width: 300px;
        margin: 0;
        padding: 0;
        box-shadow: none;
      }
      /* Prevent massive outer margins imposed by OS printing dialogs */
      @page {
        margin: 0;
      }
    }
  </style>
</head>
<body>

  <div class="action-bar">
    <button class="btn-back" onclick="window.history.back()">&#8592; Back</button>
    <button class="btn-print" onclick="window.print()">&#128438; Print Thermal Receipt</button>
  </div>

  <div class="receipt">
    <div class="header">
      <h1>Tumi Cosmetics</h1>
      <p id="invoiceNumber">INVOICE #</p>
      <p id="invoiceDates">Date: ---</p>
    </div>

    <div class="separator"></div>

    <div class="info-section">
      <p><span id="customerName">Loading...</span></p>
    </div>

    <div class="separator"></div>

    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th class="text-center">Qty</th>
          <th class="text-right">Total</th>
        </tr>
      </thead>
      <tbody id="itemsBody">
        <tr>
          <td colspan="3" class="text-center">Loading...</td>
        </tr>
      </tbody>
    </table>

    <div class="separator"></div>

    <div class="summary" id="summarySection">
      <!-- Filled by JS -->
    </div>

    <div class="separator"></div>

    <div class="footer" id="footerSection">
      <p>Thank you for your business!</p>
      <p style="margin-top:5px;">***</p>
    </div>

  </div>

  <script>
    let API_URL = '/api';
    if (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' || window.location.protocol === 'file:') {
        if (window.location.port !== '5000') {
            API_URL = 'http://localhost:5000/api';
        }
    }

    function getAuthHeaders() {
      const token = localStorage.getItem('token');
      return {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + (token || '')
      };
    }

    function formatDate(dateStr) {
      if (!dateStr) return '---';
      const d = new Date(dateStr);
      if (isNaN(d)) return '---';
      return d.toLocaleDateString('en-US', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function formatCurrency(num) {
      return Number(num).toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    async function loadInvoice() {
      const params = new URLSearchParams(window.location.search);
      const invoiceId = params.get('id');

      if (!invoiceId) {
        document.getElementById('customerName').textContent = 'No invoice ID provided';
        return;
      }

      try {
        const invRes = await fetch(`${API_URL}/invoices`, { headers: getAuthHeaders() });
        const invoices = await invRes.json();
        const inv = invoices.find(x => x._id === invoiceId);

        if (!inv) {
          document.getElementById('customerName').textContent = 'Invoice not found';
          return;
        }

        document.getElementById('invoiceNumber').textContent = `INV #${inv.number}`;
        document.getElementById('invoiceDates').textContent = `Date: ${formatDate(inv.date || inv.createdAt)}`;
        document.title = `Receipt ${inv.number}`;

        const custName = inv.customerName || (inv.customer ? inv.customer.name : 'Unknown Customer');
        const custLocation = inv.location ? `<br>Location: ${inv.location}` : '';
        const expectedPayment = inv.balance > 0 && inv.dueDate ? `<br>Due By: ${formatDate(inv.dueDate)}` : '';
        document.getElementById('customerName').innerHTML = `<strong>${custName}</strong>${custLocation}${expectedPayment}`;

        const tbody = document.getElementById('itemsBody');
        if (inv.items && inv.items.length > 0) {
            tbody.innerHTML = inv.items.map(item => `
              <tr>
                <td>${item.productName || (item.product && item.product.name ? item.product.name : 'Item')}</td>
                <td class="text-center">${item.quantity}</td>
                <td class="text-right">${formatCurrency(item.subtotal)}</td>
              </tr>
            `).join('');
        } else {
            tbody.innerHTML = `
            <tr>
              <td>Invoice Charge</td>
              <td class="text-center">1</td>
              <td class="text-right">${formatCurrency(inv.amount)}</td>
            </tr>
          `;
        }

        let totalPaid = 0;
        try {
          const rcptRes = await fetch(`${API_URL}/receipts`, { headers: getAuthHeaders() });
          const receipts = await rcptRes.json();
          const linkedReceipts = receipts.filter(r => (r.invoice && (r.invoice === invoiceId || r.invoice._id === invoiceId)));
          if (linkedReceipts.length > 0) {
            linkedReceipts.forEach(r => { totalPaid += Number(r.amount); });
          }
        } catch (e) {
          console.log('Could not fetch receipts:', e);
        }

        const totalAmount = inv.totalAmount !== undefined ? inv.totalAmount : (inv.amount || 0);
        let amountPaid = inv.amountPaid !== undefined ? inv.amountPaid : (inv.status === 'Paid' ? totalAmount : 0);
        let balance = inv.balance !== undefined ? inv.balance : Math.max(0, totalAmount - amountPaid);

        if (inv.amountPaid === undefined && totalPaid > amountPaid) {
            amountPaid = totalPaid;
            balance = Math.max(0, totalAmount - amountPaid);
        }

        const summary = document.getElementById('summarySection');

        summary.innerHTML = `
        <div class="summary-line bold">
          <span>Total:</span>
          <span>UGX ${formatCurrency(totalAmount)}</span>
        </div>
        ${amountPaid > 0 ? `
        <div class="summary-line">
          <span>Paid:</span>
          <span>UGX ${formatCurrency(amountPaid)}</span>
        </div>` : ''}
        <div class="summary-line ${balance > 0 ? 'bold' : ''}">
          <span>Balance:</span>
          <span>UGX ${formatCurrency(balance)}</span>
        </div>
        <div class="summary-line" style="margin-top:8px; border-top: 1px dotted #ccc; padding-top: 4px;">
          <span>Status:</span>
          <span style="font-weight:bold;">${inv.status.toUpperCase()}</span>
        </div>
      `;

      } catch (err) {
        console.error('Error loading invoice:', err);
        document.getElementById('customerName').textContent = 'Error loading invoice data';
      }
    }

    loadInvoice();
  </script>
</body>
</html>
