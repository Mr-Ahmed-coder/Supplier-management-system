<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customers</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="wrapper">
  <!-- Sidebar -->
  <div id="sidebar-wrapper"></div>

  <!-- Page Content -->
  <div id="page-content-wrapper">
    <nav class="top-navbar d-flex align-items-center justify-content-between shadow-sm">
      <div class="d-flex align-items-center">
        <i class="bi bi-list fs-3" id="menu-toggle"></i>
        <h4 class="ms-3 m-0 page-title">Customer Database</h4>
      </div>
      <div class="user-info">
        <span class="user-role-badge" id="userRoleBadge">User</span>
        <span class="fw-semibold text-secondary" id="userNameLabel">Loading...</span>
        <button class="btn btn-outline-danger btn-sm ms-3" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </nav>
    
    <div class="container-fluid py-4 px-4">
      
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="fw-bold mb-1">Customers</h3>
          <p class="text-muted mb-0">Manage your customer database</p>
        </div>
        <button class="btn btn-primary admin-only" data-bs-toggle="modal" data-bs-target="#customerModal">
          <i class="bi bi-plus-lg me-1"></i> Add Customer
        </button>
      </div>

      <!-- Summary Cards -->
      <div class="row g-4 mb-4">
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Total Customers</span>
              <h3 id="totalCustomers" class="m-0 text-primary">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Active Customers</span>
              <h3 id="activeCustomers" class="m-0 text-success">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Pending Invoices</span>
              <h3 id="pendingCustomers" class="m-0 text-warning">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Total Outstanding</span>
              <h3 id="totalOutstanding" class="m-0 text-danger">$0.00</h3>
            </div>
          </div>
        </div>
      </div>

      <!-- Search & Table Card -->
      <div class="card shadow-sm">
        <div class="card-body">
          <input type="text" id="searchCustomer" class="form-control mb-4" placeholder="Search customer by name, email, or company...">
          
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Company</th>
                  <th>Balance</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="customerTable">
                <tr><td colspan="7" class="text-center text-muted py-4">Loading customers...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add/Edit Customer Modal -->
<div class="modal fade" id="customerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-primary text-white border-0">
        <h5 class="modal-title fw-bold" id="customerModalTitle">Add Customer</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" id="custName" class="form-control" required maxlength="100" placeholder="e.g. John Doe">
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="custEmail" class="form-control" maxlength="100" placeholder="e.g. john@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Phone</label>
          <input type="tel" id="custPhone" class="form-control" maxlength="20" placeholder="e.g. +256 700 123456">
        </div>
        <div class="mb-3">
          <label class="form-label">Company</label>
          <input type="text" id="custCompany" class="form-control" maxlength="100" placeholder="e.g. Acme Corp">
        </div>
        <div class="mb-3">
          <label class="form-label">Balance / Outstanding ($)</label>
          <input type="number" id="custBalance" class="form-control" min="0" step="0.01" value="0">
        </div>
      </div>
      <div class="modal-footer border-0 pt-0 px-4 pb-4">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary px-4" id="saveCustomer">Save</button>
      </div>
    </div>
  </div>
</div>

<!-- View Customer Modal -->
<div class="modal fade" id="viewCustomerModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-light border-0">
        <h5 class="modal-title fw-bold text-dark">Customer Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4" id="viewCustomerBody">
        <!-- Content injected here -->
      </div>
      <div class="modal-footer border-0 pt-0 px-4 pb-4">
        <button class="btn btn-secondary w-100" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS & Auth -->
<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script src="layout.js"></script>
<script src="script.js"></script>

<script>
let customers = [];
let editId = null;

const table = document.getElementById("customerTable");
const saveBtn = document.getElementById("saveCustomer");
const searchInput = document.getElementById("searchCustomer");

const userStr = localStorage.getItem('user');
const currentUser = userStr ? JSON.parse(userStr) : null;
const isAdmin = currentUser && currentUser.role === 'Admin';

async function fetchCustomers() {
  try {
    const res = await fetch(`${API_URL}/customers`, { headers: getAuthHeaders() });
    customers = await res.json();
    renderCustomers();
  } catch(err) { console.error(err); }
}

function renderCustomers() {
  table.innerHTML = "";
  if (!customers || customers.length === 0) {
    table.innerHTML = `<tr><td colspan="7" class="text-center text-muted py-4">No customers found.</td></tr>`;
    updateSummary();
    return;
  }
  customers.forEach((c) => {
    let statusClass = c.balance > 0 ? "status-overdue" : "status-paid";
    let statusText = c.balance > 0 ? "Outstanding" : "Clear";
    
    // Conditionally render admin action buttons
    const adminActions = isAdmin ? `
      <button class="btn btn-sm btn-outline-primary shadow-sm me-1" onclick="editCustomer('${c._id}')" title="Edit"><i class="bi bi-pencil"></i></button>
      <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="deleteCustomer('${c._id}')" title="Delete"><i class="bi bi-trash"></i></button>
    ` : '';

    table.innerHTML += `
      <tr>
        <td class="fw-semibold text-dark">${c.name}</td>
        <td>${c.email || "—"}</td>
        <td>${c.phone || "—"}</td>
        <td>${c.company || "—"}</td>
        <td class="fw-bold text-primary">$${Number(c.balance).toFixed(2)}</td>
        <td><span class="badge-status ${statusClass}">${statusText}</span></td>
        <td>
          <button class="btn btn-sm btn-outline-info shadow-sm me-1" onclick="viewCustomer('${c._id}')" title="View"><i class="bi bi-eye"></i></button>
          ${adminActions}
        </td>
      </tr>
    `;
  });
  updateSummary();
}

async function updateSummary() {
  document.getElementById("totalCustomers").innerText = customers.length;
  document.getElementById("activeCustomers").innerText = customers.filter(c => c.balance === 0).length;
  
  try {
    const invRes = await fetch(`${API_URL}/invoices`, { headers: getAuthHeaders() });
    const invoices = await invRes.json();
    const pendingNames = new Set();
    invoices.filter(inv => inv.status === "Pending" || inv.status === "Overdue")
      .forEach(inv => pendingNames.add(inv.customerName || (inv.customer && inv.customer.name)));
    document.getElementById("pendingCustomers").innerText = pendingNames.size;
  } catch(err) {}

  const totalOutstanding = customers.reduce((sum, c) => sum + (parseFloat(c.balance) || 0), 0);
  document.getElementById("totalOutstanding").innerText = `$${totalOutstanding.toFixed(2)}`;
}

saveBtn.addEventListener("click", async function () {
  const name = document.getElementById("custName").value.trim();
  const email = document.getElementById("custEmail").value.trim();
  const phone = document.getElementById("custPhone").value.trim();
  const company = document.getElementById("custCompany").value.trim();
  const balance = parseFloat(document.getElementById("custBalance").value) || 0;

  if (!name) return alert("Please enter a customer name.");
  if (balance < 0) return alert("Balance cannot be negative.");

  const payload = { name, email, phone, company, balance };
  
  try {
    let res;
    if (editId) {
      res = await fetch(`${API_URL}/customers/${editId}`, {
        method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify(payload)
      });
      editId = null;
      document.getElementById("customerModalTitle").innerText = "Add Customer";
    } else {
      res = await fetch(`${API_URL}/customers`, {
        method: 'POST', headers: getAuthHeaders(), body: JSON.stringify(payload)
      });
    }
    
    if (res.ok) {
      fetchCustomers();
      clearForm();
      bootstrap.Modal.getOrCreateInstance(document.getElementById("customerModal")).hide();
    } else {
      alert("Error saving customer. Check permissions.");
    }
  } catch(err) { console.error(err); }
});

async function viewCustomer(id) {
  const c = customers.find(x => x._id === id);
  let invoiceRows = `<tr><td colspan="3" class="text-center text-muted py-3">Loading invoices...</td></tr>`;
  document.getElementById("viewCustomerBody").innerHTML = `
    <div class="mb-4">
      <h4 class="fw-bold mb-3">${c.name}</h4>
      <div class="d-flex align-items-center mb-2"><i class="bi bi-envelope text-primary me-3 fs-5"></i><span>${c.email || "No email"}</span></div>
      <div class="d-flex align-items-center mb-2"><i class="bi bi-telephone text-primary me-3 fs-5"></i><span>${c.phone || "No phone"}</span></div>
      <div class="d-flex align-items-center mb-2"><i class="bi bi-building text-primary me-3 fs-5"></i><span>${c.company || "No company"}</span></div>
      <div class="d-flex align-items-center mt-3 pt-3 border-top">
        <strong class="me-2">Current Balance:</strong> 
        <span class="fs-5 fw-bold text-danger">$${Number(c.balance).toFixed(2)}</span>
      </div>
    </div>
    <div class="bg-light p-3 rounded-3">
      <h6 class="fw-bold mb-3">Invoice History</h6>
      <div class="table-responsive">
        <table class="table table-sm table-borderless m-0">
          <thead class="border-bottom"><tr><th>Inv #</th><th>Amount</th><th>Status</th></tr></thead>
          <tbody id="viewCustomerInvoices">${invoiceRows}</tbody>
        </table>
      </div>
    </div>
  `;
  new bootstrap.Modal(document.getElementById("viewCustomerModal")).show();
  
  try {
    const res = await fetch(`${API_URL}/invoices`, { headers: getAuthHeaders() });
    const allInvoices = await res.json();
    const custInvoices = allInvoices.filter(inv => inv.customer && inv.customer._id === id);
    if(custInvoices.length > 0) {
      document.getElementById("viewCustomerInvoices").innerHTML = custInvoices.map(inv => {
        const badgeClass = inv.status === "Paid" ? "status-paid" : inv.status === "Pending" ? "status-pending" : "status-overdue";
        return `<tr><td class="py-2">${inv.number}</td><td class="py-2 fw-semibold">$${Number(inv.amount).toFixed(2)}</td><td class="py-2"><span class="badge-status ${badgeClass}">${inv.status}</span></td></tr>`;
      }).join("");
    } else {
      document.getElementById("viewCustomerInvoices").innerHTML = `<tr><td colspan="3" class="text-center text-muted py-3">No invoices found for this customer.</td></tr>`;
    }
  } catch(err) {}
}

async function deleteCustomer(id) {
  const c = customers.find(x => x._id === id);
  if (confirm(`Are you absolutely sure you want to delete customer "${c.name}"?`)) {
    try {
      const res = await fetch(`${API_URL}/customers/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
      if(res.ok) fetchCustomers();
      else alert("Restricted: Admins only.");
    } catch(err) { console.error(err); }
  }
}

function editCustomer(id) {
  const c = customers.find(x => x._id === id);
  document.getElementById("custName").value = c.name;
  document.getElementById("custEmail").value = c.email || "";
  document.getElementById("custPhone").value = c.phone || "";
  document.getElementById("custCompany").value = c.company || "";
  document.getElementById("custBalance").value = c.balance;
  editId = id;
  document.getElementById("customerModalTitle").innerText = "Edit Customer";
  new bootstrap.Modal(document.getElementById("customerModal")).show();
}

searchInput.addEventListener("input", function () {
  const value = this.value.toLowerCase();
  const rows = table.querySelectorAll("tr");
  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
  });
});

function clearForm() {
  document.getElementById("custName").value = "";
  document.getElementById("custEmail").value = "";
  document.getElementById("custPhone").value = "";
  document.getElementById("custCompany").value = "";
  document.getElementById("custBalance").value = "0";
}

fetchCustomers();
</script>
</body>
</html>
