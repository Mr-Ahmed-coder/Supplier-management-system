<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - SysAdmin</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-wrapper">

<div class="container d-flex justify-content-center align-items-center">
  <div class="card auth-card shadow-lg border-0 bg-white">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 56px; height: 56px;">
        <i class="bi bi-box-seam fs-3"></i>
      </div>
      <h3 class="fw-bold text-dark">Welcome Back</h3>
      <p class="text-muted small">Sign in to your SysAdmin account</p>
    </div>
    
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label text-secondary fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" id="email" class="form-control border-start-0 ps-0 text-dark" required placeholder="name@company.com">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label text-secondary fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" id="password" class="form-control border-start-0 ps-0 text-dark" required placeholder="••••••••">
        </div>
      </div>
      
      <div id="errorMsg" class="alert alert-danger px-3 py-2 small mb-4" style="display:none; border-left: 4px solid #dc3545;"><i class="bi bi-exclamation-circle me-2"></i><span id="errorText"></span></div>
      
      <button type="submit" class="btn btn-primary w-100 py-2 mb-4 fw-bold shadow-sm">Sign In <i class="bi bi-arrow-right-short ms-1"></i></button>
      
      <div class="text-center">
        <span class="text-muted small">Don't have an account? </span><a href="register.html" class="text-decoration-none fw-semibold">Create one</a>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    
    try {
      const res = await fetch('/api/users/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        window.location.href = 'dashboard.html';
      } else {
        errorText.innerText = data.message || 'Invalid credentials';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorText.innerText = 'Server connection failed';
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html>
