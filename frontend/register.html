<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - SysAdmin</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-wrapper">

<div class="container d-flex justify-content-center align-items-center py-5">
  <div class="card auth-card shadow-lg border-0 bg-white">
    <div class="text-center mb-4">
      <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-circle mb-3" style="width: 56px; height: 56px;">
        <i class="bi bi-person-plus fs-3"></i>
      </div>
      <h3 class="fw-bold text-dark">Create Account</h3>
      <p class="text-muted small">Join SysAdmin to manage operations</p>
    </div>
    
    <form id="registerForm">
      <div class="mb-3">
        <label class="form-label text-secondary fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
          <input type="text" id="name" class="form-control border-start-0 ps-0 text-dark" required placeholder="John Doe">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label text-secondary fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" id="email" class="form-control border-start-0 ps-0 text-dark" required placeholder="john@company.com">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label text-secondary fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" id="password" class="form-control border-start-0 ps-0 text-dark" required placeholder="Create a strong password">
        </div>
      </div>
      
      <div class="mb-4 bg-light p-3 rounded border">
        <label class="form-label fw-bold text-dark mb-2 d-block border-bottom pb-2">Account Type</label>
        <div class="form-check form-switch mt-2">
          <input class="form-check-input mt-1" type="checkbox" role="switch" id="isAdminRole">
          <label class="form-check-label ps-1 text-secondary" for="isAdminRole">Request <strong class="text-danger">Admin</strong> Privileges</label>
        </div>
        <small class="text-muted d-block mt-2" style="font-size: 0.75rem;"><i class="bi bi-info-circle me-1"></i>Admins have full write/delete access across all modules.</small>
      </div>
      
      <div id="errorMsg" class="alert alert-danger px-3 py-2 small mb-3" style="display:none; border-left: 4px solid #dc3545;"><i class="bi bi-exclamation-circle me-2"></i><span id="errorText"></span></div>
      <div id="successMsg" class="alert alert-success px-3 py-2 small mb-3" style="display:none; border-left: 4px solid #198754;"><i class="bi bi-check-circle me-2"></i><span id="successText"></span></div>
      
      <button type="submit" class="btn btn-primary w-100 py-2 mb-4 fw-bold shadow-sm">Sign Up <i class="bi bi-arrow-right-short ms-1"></i></button>
      
      <div class="text-center">
        <span class="text-muted small">Already have an account? </span><a href="login.html" class="text-decoration-none fw-semibold">Sign in</a>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    // Map checkbox to the exact new schema ENUMs
    const role = document.getElementById('isAdminRole').checked ? 'Admin' : 'User';
    
    const errorMsg = document.getElementById('errorMsg');
    const errorText = document.getElementById('errorText');
    const successMsg = document.getElementById('successMsg');
    const successText = document.getElementById('successText');
    
    errorMsg.style.display = 'none';
    successMsg.style.display = 'none';
    
    try {
      const res = await fetch('/api/users/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password, role })
      });
      const data = await res.json();
      
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data));
        successText.innerText = 'Registration complete! Redirecting...';
        successMsg.style.display = 'block';
        setTimeout(() => {
          window.location.href = 'dashboard.html';
        }, 1500);
      } else {
        errorText.innerText = data.message || 'Registration failed';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorText.innerText = 'Network error during registration';
      errorMsg.style.display = 'block';
    }
  });
</script>
</body>
</html>
