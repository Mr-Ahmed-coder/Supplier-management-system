<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventory</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="wrapper">
  <!-- Sidebar -->
  <div id="sidebar-wrapper"></div>

  <!-- Page Content -->
  <div id="page-content-wrapper">
    <nav class="top-navbar d-flex align-items-center justify-content-between shadow-sm">
      <div class="d-flex align-items-center">
        <i class="bi bi-list fs-3" id="menu-toggle"></i>
        <h4 class="ms-3 m-0 page-title">Inventory Control</h4>
      </div>
      <div class="user-info">
        <span class="user-role-badge" id="userRoleBadge">User</span>
        <span class="fw-semibold text-secondary" id="userNameLabel">Loading...</span>
        <button class="btn btn-outline-danger btn-sm ms-3" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </nav>
    
    <div class="container-fluid py-4 px-4">
      
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="fw-bold mb-1">Products & Stock</h3>
          <p class="text-muted mb-0">Manage product details and current inventory levels</p>
        </div>
        <button class="btn btn-primary admin-only" data-bs-toggle="modal" data-bs-target="#productModal">
          <i class="bi bi-plus-lg me-1"></i> Add Product
        </button>
      </div>

      <!-- Summary Cards -->
      <div class="row g-4 mb-4">
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Total Products</span>
              <h3 id="totalProducts" class="m-0 text-primary">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Items In Stock</span>
              <h3 id="inStockCount" class="m-0 text-success">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Low Stock Alerts</span>
              <h3 id="lowStockCount" class="m-0 text-warning">0</h3>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card h-100 mb-0 shadow-sm border-0">
            <div class="card-body">
              <span class="text-muted d-block mb-1 font-weight-bold" style="font-size: 0.85rem;">Out of Stock</span>
              <h3 id="outStockCount" class="m-0 text-danger">0</h3>
            </div>
          </div>
        </div>
      </div>

      <!-- Search & Table Card -->
      <div class="card shadow-sm">
        <div class="card-body">
          <input type="text" id="searchProduct" class="form-control mb-4" placeholder="Search product by name or category...">
          
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Product Name</th>
                  <th>Category</th>
                  <th>Unit Price</th>
                  <th>Stock Qty</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="inventoryTable">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading products...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- Add/Edit Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-primary text-white border-0">
        <h5 class="modal-title fw-bold" id="productModalTitle">Add Product</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <div class="mb-3">
          <label class="form-label">Product Name</label>
          <input type="text" id="productName" class="form-control" required maxlength="100" placeholder="e.g. Wireless Mouse">
        </div>
        <div class="mb-3">
          <label class="form-label">Category</label>
          <input type="text" id="productCategory" class="form-control" maxlength="50" placeholder="e.g. Electronics">
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Unit Price ($)</label>
            <input type="number" id="productPrice" class="form-control" min="0" step="0.01" required value="0.00">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Stock Quantity</label>
            <input type="number" id="productStock" class="form-control" min="0" required value="0">
          </div>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0 px-4 pb-4">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary px-4" id="saveProduct">Save Product</button>
      </div>
    </div>
  </div>
</div>

<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script src="layout.js"></script>
<script src="script.js"></script>

<script>
let products = [];
let editId = null;

const table = document.getElementById("inventoryTable");
const saveBtn = document.getElementById("saveProduct");
const searchInput = document.getElementById("searchProduct");

const userStr = localStorage.getItem('user');
const currentUser = userStr ? JSON.parse(userStr) : null;
const isAdmin = currentUser && currentUser.role === 'Admin';

async function fetchProducts() {
  try {
    const res = await fetch(`${API_URL}/products`, { headers: getAuthHeaders() });
    products = await res.json();
    renderProducts();
  } catch(err) { console.error(err); }
}

function renderProducts() {
  table.innerHTML = "";
  if (!products || products.length === 0) {
    table.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No products found. Add a product to get started.</td></tr>`;
    updateSummary();
    return;
  }
  
  products.forEach((p) => {
    let statusClass = p.stock > 10 ? "in-stock" : p.stock > 0 ? "low-stock" : "out-stock";
    let statusText = p.stock > 10 ? "In Stock" : p.stock > 0 ? "Low Stock" : "Out of Stock";

    const adminActions = isAdmin ? `
      <button class="btn btn-sm btn-outline-primary shadow-sm me-1" onclick="editProduct('${p._id}')" title="Edit"><i class="bi bi-pencil"></i></button>
      <button class="btn btn-sm btn-outline-danger shadow-sm" onclick="deleteProduct('${p._id}')" title="Delete"><i class="bi bi-trash"></i></button>
    ` : '';

    table.innerHTML += `
      <tr>
        <td class="fw-semibold text-dark">${p.name}</td>
        <td>${p.category || '—'}</td>
        <td class="fw-bold text-primary">$${Number(p.price).toFixed(2)}</td>
        <td>${p.stock}</td>
        <td><span class="badge-status ${statusClass}">${statusText}</span></td>
        <td>
          ${adminActions}
        </td>
      </tr>
    `;
  });
  updateSummary();
}

function updateSummary() {
  document.getElementById("totalProducts").innerText = products.length;
  document.getElementById("inStockCount").innerText = products.filter(p => p.stock > 10).length;
  document.getElementById("lowStockCount").innerText = products.filter(p => p.stock > 0 && p.stock <= 10).length;
  document.getElementById("outStockCount").innerText = products.filter(p => p.stock === 0).length;
}

saveBtn.addEventListener("click", async function () {
  const name = document.getElementById("productName").value.trim();
  const category = document.getElementById("productCategory").value.trim();
  const price = parseFloat(document.getElementById("productPrice").value);
  const stock = parseInt(document.getElementById("productStock").value);

  if (!name || isNaN(price) || isNaN(stock) || price < 0 || stock < 0) {
    alert("Please fill all fields correctly.");
    return;
  }

  const payload = { name, category, price, stock };

  try {
    let res;
    if (editId) {
      res = await fetch(`${API_URL}/products/${editId}`, {
        method: 'PUT', headers: getAuthHeaders(), body: JSON.stringify(payload)
      });
      editId = null;
      document.getElementById("productModalTitle").innerText = "Add Product";
    } else {
      res = await fetch(`${API_URL}/products`, {
        method: 'POST', headers: getAuthHeaders(), body: JSON.stringify(payload)
      });
    }

    if (res.ok) {
      fetchProducts();
      clearForm();
      bootstrap.Modal.getOrCreateInstance(document.getElementById("productModal")).hide();
    } else {
      alert("Error saving product. Check permissions.");
    }
  } catch(err) { console.error(err); }
});

async function deleteProduct(id) {
  const p = products.find(x => x._id === id);
  if (confirm(`Are you absolutely sure you want to delete product "${p.name}"?`)) {
    try {
      const res = await fetch(`${API_URL}/products/${id}`, { method: 'DELETE', headers: getAuthHeaders() });
      if(res.ok) fetchProducts();
      else alert("Restricted: Admins only.");
    } catch(err) { console.error(err); }
  }
}

function editProduct(id) {
  const p = products.find(x => x._id === id);
  document.getElementById("productName").value = p.name;
  document.getElementById("productCategory").value = p.category || "";
  document.getElementById("productPrice").value = p.price;
  document.getElementById("productStock").value = p.stock;
  editId = id;
  document.getElementById("productModalTitle").innerText = "Edit Product";
  new bootstrap.Modal(document.getElementById("productModal")).show();
}

searchInput.addEventListener("input", function () {
  const value = this.value.toLowerCase();
  const rows = table.querySelectorAll("tr");
  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
  });
});

function clearForm() {
  document.getElementById("productName").value = "";
  document.getElementById("productCategory").value = "";
  document.getElementById("productPrice").value = "0.00";
  document.getElementById("productStock").value = "0";
}

fetchProducts();
</script>
</body>
</html>
