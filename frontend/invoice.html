<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoices</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="wrapper">
  <!-- Sidebar -->
  <div id="sidebar-wrapper"></div>

  <!-- Page Content -->
  <div id="page-content-wrapper">
    <nav class="top-navbar d-flex align-items-center justify-content-between shadow-sm">
      <div class="d-flex align-items-center">
        <i class="bi bi-list fs-3" id="menu-toggle"></i>
        <h4 class="ms-3 m-0 page-title">Invoice Management</h4>
      </div>
      <div class="user-info">
        <span class="user-role-badge" id="userRoleBadge">User</span>
        <span class="fw-semibold text-secondary" id="userNameLabel">Loading...</span>
        <button class="btn btn-outline-danger btn-sm ms-3" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </nav>
    
    <div class="container-fluid py-4 px-4">
      
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="fw-bold mb-1">Invoices</h3>
          <p class="text-muted mb-0">View and manage customer billing</p>
        </div>
        <div>
          <div class="btn-group me-2">
            <button type="button" class="btn btn-outline-success dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">
              <i class="bi bi-file-earmark-excel me-1"></i> Export
            </button>
            <ul class="dropdown-menu">
              <li><a class="dropdown-item exportCsvBtn" href="#" data-query="">Export All</a></li>
              <li><a class="dropdown-item exportCsvBtn" href="#" data-query="?filter=today">Export Today</a></li>
              <li><hr class="dropdown-divider"></li>
              <li><a class="dropdown-item exportCsvBtn" href="#" data-query="?status=Paid">Export Paid</a></li>
              <li><a class="dropdown-item exportCsvBtn" href="#" data-query="?status=Partial">Export Partial/Overdue</a></li>
            </ul>
          </div>
          <a href="createinvoice.html" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i> Create Invoice
          </a>
        </div>
      </div>

      <!-- Search & Table Card -->
      <div class="card shadow-sm">
        <div class="card-body">
          <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search invoices by customer, number, or status...">
          
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Invoice #</th>
                  <th>Customer Name</th>
                  <th>Date Issued</th>
                  <th>Total Amount</th>
                  <th>Paid</th>
                  <th>Balance</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="invoiceTable">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading invoices...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script src="layout.js"></script>
<script src="script.js"></script>

<script>
let invoices = [];

async function fetchInvoices() {
  try {
    const res = await fetch(`${API_URL}/invoices`, { headers: getAuthHeaders() });
    invoices = await res.json();
    renderInvoices();
  } catch(err) { console.error(err); }
}

function renderInvoices() {
  const table = document.getElementById("invoiceTable");
  table.innerHTML = "";
  if (!invoices || invoices.length === 0) {
    table.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No invoices found.</td></tr>`;
    return;
  }
  
  invoices.forEach(inv => {
    // Math Resolvers to handle legacy structure mappings
    const totalAmount = inv.totalAmount !== undefined ? inv.totalAmount : (inv.amount || 0);
    const amountPaid = inv.amountPaid !== undefined ? inv.amountPaid : (inv.status === 'Paid' ? totalAmount : 0);
    const balance = inv.balance !== undefined ? inv.balance : (inv.status === 'Paid' ? 0 : totalAmount);

    const phone = inv.customerPhone || (inv.customer ? inv.customer.phone : '');
    
    let callHtml = `<button class="btn btn-sm btn-outline-secondary me-1" disabled title="No Phone Available"><i class="bi bi-telephone"></i></button>`;
    let waHtml = `<button class="btn btn-sm btn-outline-secondary me-1" disabled title="No Phone Available"><i class="bi bi-whatsapp"></i></button>`;
    
    if (phone && phone.length > 5) {
        const cleanPhone = phone.replace(/[^0-9]/g, '');
        const waMsg = encodeURIComponent(`Hello, I'm reaching out regarding your invoice ${inv.number}. The current outstanding balance is UGX ${Number(balance).toLocaleString('en-US')}. Please let us know if you need any assistance!`);
        callHtml = `<a href="tel:${phone}" class="btn btn-sm btn-outline-success me-1" title="Call Customer"><i class="bi bi-telephone-fill"></i></a>`;
        waHtml = `<a href="https://wa.me/${cleanPhone}?text=${waMsg}" target="_blank" class="btn btn-sm btn-success me-1" title="WhatsApp Customer"><i class="bi bi-whatsapp"></i></a>`;
    }

    const displayStatus = (inv.status === "Pending" || inv.status === "Unpaid") ? "Partial" : inv.status;

    let badgeClass = "badge-status text-white ";
    if (displayStatus === "Paid") badgeClass += "bg-success";
    else if (displayStatus === "Partial") badgeClass += "bg-warning text-dark";
    else badgeClass += "bg-danger";
    
    table.innerHTML += `
      <tr>
        <td class="fw-semibold text-dark">${inv.number}</td>
        <td>
          ${inv.customerName || (inv.customer ? inv.customer.name : 'Unknown')}
          ${phone ? `<br><small class="text-muted"><i class="bi bi-telephone"></i> ${phone}</small>` : ''}
          ${inv.location ? `<br><small class="text-muted"><i class="bi bi-geo-alt"></i> ${inv.location}</small>` : ''}
        </td>
        <td>
          <div class="d-flex flex-column">
            <span>${inv.date ? new Date(inv.date).toLocaleDateString() : new Date(inv.createdAt).toLocaleDateString()}</span>
            ${inv.dueDate ? `<small class="text-warning fw-bold mt-1" style="font-size: 0.70rem;">Expected: ${new Date(inv.dueDate).toLocaleDateString()}</small>` : ''}
          </div>
        </td>
        <td class="fw-bold">UGX ${Number(totalAmount).toLocaleString('en-US')}</td>
        <td class="text-success text-opacity-75 fw-bold">UGX ${Number(amountPaid).toLocaleString('en-US')}</td>
        <td class="text-danger fw-bold">UGX ${Number(balance).toLocaleString('en-US')}</td>
        <td><span class="badge ${badgeClass}">${displayStatus}</span></td>
        <td>
          ${waHtml}
          ${callHtml}
          <button class="btn btn-sm btn-outline-primary me-1" onclick="window.location.href='createinvoice.html?id=${inv._id}'" title="View / Edit / Pay"><i class="bi bi-pencil-square"></i></button>
          <button class="btn btn-sm btn-outline-secondary" onclick="window.location.href='printinvoice.html?id=${inv._id}'" title="Print Output"><i class="bi bi-printer"></i></button>
        </td>
      </tr>
    `;
  });
}

document.getElementById("searchInput").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  const rows = document.querySelectorAll("#invoiceTable tr");
  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
  });
});

document.querySelectorAll(".exportCsvBtn").forEach(btn => {
  btn.addEventListener("click", async function(e) {
    e.preventDefault();
    try {
      const q = this.dataset.query || "";
      const originalText = this.innerHTML;
      this.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Generating...`;

      const res = await fetch(`${API_URL}/invoices/export/csv${q}`, {
        method: 'GET',
        headers: getAuthHeaders()
      });

      if (!res.ok) {
          let errMsg = "Export failed.";
          try { const errData = await res.json(); errMsg = errData.message; } catch(e) {}
          throw new Error(errMsg);
      }

      const blob = await res.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.style.display = 'none';
      a.href = url;
      a.download = `POS_Invoices_Export${q.replace('?','_').replace('=','_')}_${new Date().toISOString().split('T')[0]}.xlsx`;
      document.body.appendChild(a);
      a.click();
      window.URL.revokeObjectURL(url);
      
      this.innerHTML = originalText;

    } catch (err) {
        alert("CSV Export Error: " + err.message);
        this.innerHTML = "Export Failed";
    }
  });
});

fetchInvoices();
</script>
</body>
</html>
