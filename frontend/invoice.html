<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoices</title>
  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="wrapper">
  <!-- Sidebar -->
  <div id="sidebar-wrapper"></div>

  <!-- Page Content -->
  <div id="page-content-wrapper">
    <nav class="top-navbar d-flex align-items-center justify-content-between shadow-sm">
      <div class="d-flex align-items-center">
        <i class="bi bi-list fs-3" id="menu-toggle"></i>
        <h4 class="ms-3 m-0 page-title">Invoice Management</h4>
      </div>
      <div class="user-info">
        <span class="user-role-badge" id="userRoleBadge">User</span>
        <span class="fw-semibold text-secondary" id="userNameLabel">Loading...</span>
        <button class="btn btn-outline-danger btn-sm ms-3" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Logout</button>
      </div>
    </nav>
    
    <div class="container-fluid py-4 px-4">
      
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="fw-bold mb-1">Invoices</h3>
          <p class="text-muted mb-0">View and manage customer billing</p>
        </div>
        <a href="createinvoice.html" class="btn btn-primary">
          <i class="bi bi-plus-lg me-1"></i> Create Invoice
        </a>
      </div>

      <!-- Search & Table Card -->
      <div class="card shadow-sm">
        <div class="card-body">
          <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search invoices by customer, number, or status...">
          
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>Invoice #</th>
                  <th>Customer Name</th>
                  <th>Date Issued</th>
                  <th>Amount</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="invoiceTable">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading invoices...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script src="layout.js"></script>
<script src="script.js"></script>

<script>
let invoices = [];

async function fetchInvoices() {
  try {
    const res = await fetch(`${API_URL}/invoices`, { headers: getAuthHeaders() });
    invoices = await res.json();
    renderInvoices();
  } catch(err) { console.error(err); }
}

function renderInvoices() {
  const table = document.getElementById("invoiceTable");
  table.innerHTML = "";
  if (!invoices || invoices.length === 0) {
    table.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No invoices found.</td></tr>`;
    return;
  }
  
  invoices.forEach(inv => {
    const badgeClass = inv.status === "Paid" ? "status-paid" : inv.status === "Pending" ? "status-pending" : "status-overdue";
    table.innerHTML += `
      <tr>
        <td class="fw-semibold text-dark">${inv.number}</td>
        <td>${inv.customerName || (inv.customer ? inv.customer.name : 'Unknown')}</td>
        <td>${inv.date ? new Date(inv.date).toLocaleDateString() : new Date(inv.createdAt).toLocaleDateString()}</td>
        <td class="fw-bold text-primary">UGX ${Number(inv.amount).toLocaleString('en-US')}</td>
        <td><span class="badge-status ${badgeClass}">${inv.status}</span></td>
        <td>
          <button class="btn btn-sm btn-outline-primary me-1" onclick="window.location.href='createinvoice.html?id=${inv._id}'"><i class="bi bi-eye me-1"></i>View / Edit</button>
          <button class="btn btn-sm btn-outline-secondary" onclick="window.location.href='printinvoice.html?id=${inv._id}'"><i class="bi bi-printer me-1"></i>Print</button>
        </td>
      </tr>
    `;
  });
}

document.getElementById("searchInput").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  const rows = document.querySelectorAll("#invoiceTable tr");
  rows.forEach(row => {
    row.style.display = row.innerText.toLowerCase().includes(value) ? "" : "none";
  });
});

fetchInvoices();
</script>
</body>
</html>
